name: Native SDK Release

on:
  push:
    tags:
      - "native-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing native-v* tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-26
    defaults:
      run:
        working-directory: NativeApp
    env:
      APP_NAME: Inbox Zero Mail
      BINARY_NAME: inbox-zero-mail-native
      NATIVE_SDK_VERSION: 0.5.3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Resolve and validate release version
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ "$release_tag" != native-v* ]]; then
            echo "Native releases require a native-v* tag."
            exit 1
          fi
          version="${release_tag#native-v}"
          manifest_version="$(awk -F '"' '/^[[:space:]]*\.version = / { print $2; exit }' app.zon)"
          if [[ "$version" != "$manifest_version" ]]; then
            echo "Tag version ($version) does not match NativeApp/app.zon ($manifest_version)."
            exit 1
          fi
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Test and validate Native app
        shell: bash
        run: |
          set -euo pipefail
          npx --yes "@native-sdk/cli@${NATIVE_SDK_VERSION}" test . --yes
          npx --yes "@native-sdk/cli@${NATIVE_SDK_VERSION}" check . --strict
          export PATH="$HOME/.native/toolchains/zig-0.16.0:$PATH"
          npx --yes "@native-sdk/cli@${NATIVE_SDK_VERSION}" doctor --manifest app.zon --strict

      - name: Generate packaged OAuth configuration
        shell: bash
        env:
          INBOX_ZERO_GMAIL_CLIENT_ID: ${{ secrets.INBOX_ZERO_GMAIL_CLIENT_ID }}
          INBOX_ZERO_GMAIL_CLIENT_SECRET: ${{ secrets.INBOX_ZERO_GMAIL_CLIENT_SECRET }}
          INBOX_ZERO_OUTLOOK_CLIENT_ID: ${{ secrets.INBOX_ZERO_OUTLOOK_CLIENT_ID }}
        run: node scripts/write-oauth-config.mjs --require-gmail

      - name: Import Developer ID certificate
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release.keychain-db"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

      - name: Build and sign app bundle
        shell: bash
        run: |
          set -euo pipefail
          app_path="$RUNNER_TEMP/${APP_NAME}.app"
          npx --yes "@native-sdk/cli@${NATIVE_SDK_VERSION}" build . --yes
          test -s "zig-out/bin/${BINARY_NAME}"
          npx --yes "@native-sdk/cli@${NATIVE_SDK_VERSION}" package \
            --target macos \
            --output "$app_path" \
            --binary "zig-out/bin/${BINARY_NAME}" \
            --assets assets \
            --signing identity \
            --identity "Developer ID Application"
          test -s "$app_path/Contents/Resources/assets/oauth.json"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Prepare notarization API key
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/notary"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Notarize and staple app bundle
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/notary/AuthKey_${APPLE_API_KEY_ID}.p8"
          app_zip="$RUNNER_TEMP/Inbox-Zero-Native-${RELEASE_VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$app_zip"
          xcrun notarytool submit "$app_zip" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple -v "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vvv -t install "$APP_PATH"

      - name: Build and sign DMG
        shell: bash
        run: |
          set -euo pipefail
          dmg_path="$RUNNER_TEMP/Inbox-Zero-Native-${RELEASE_VERSION}.dmg"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$dmg_path"
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            "$dmg_path"
          codesign --verify --verbose=2 "$dmg_path"
          echo "DMG_PATH=$dmg_path" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/notary/AuthKey_${APPLE_API_KEY_ID}.p8"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple -v "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          spctl -a -vvv -t open --context context:primary-signature "$DMG_PATH"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/release-notes.md"
          if [[ -f "../release-notes/${RELEASE_TAG}.md" ]]; then
            cp "../release-notes/${RELEASE_TAG}.md" "$notes_file"
          elif [[ -f "../release-notes/${RELEASE_VERSION}.md" ]]; then
            cp "../release-notes/${RELEASE_VERSION}.md" "$notes_file"
          else
            printf '# Inbox Zero Mail %s\n\nNative SDK macOS beta.\n' "$RELEASE_VERSION" > "$notes_file"
          fi
          gh release create "$RELEASE_TAG" "$DMG_PATH" \
            --title "Inbox Zero Mail ${RELEASE_VERSION}" \
            --notes-file "$notes_file"
